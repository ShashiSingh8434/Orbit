name: orbit
description: "Your AI-powered personal orbit — reflections, knowledge, and tasks."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Firebase ──
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── Google Sign-In ──
  google_sign_in: ^6.2.1

  # ── State Management (Riverpod) ──
  flutter_riverpod: ^3.1.0

  # ── Routing ──
  go_router: ^14.6.2

  # ── Immutable Models ──
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # ── AI ──
  # The app depends only on the abstract AIProvider interface.
  # To migrate to a backend proxy, implement a new AIProvider subclass
  # and swap the Riverpod binding — no other code changes required.
  google_generative_ai: ^0.4.6

  # ── Voice-to-Text ──
  record: ^5.1.2
  path_provider: ^2.1.3

  # ── Environment Variables ──
  # Keys are loaded from .env (gitignored). See .env.example.
  flutter_dotenv: ^5.2.1

  # ── Persistence ──
  shared_preferences: ^2.3.3

  # ── Utilities ──
  uuid: ^4.3.3

  # ── Typography ──
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.7+1

  # ── AI Infrastructure ──
  flutter_secure_storage: ^9.2.4
  http: ^1.2.2
  crypto: ^3.0.6
  url_launcher: ^6.3.1

  # ── Charts ──
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

  # ── Code Generation ──
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0

  # ── Linting ──
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_logo_dark.png"

dependency_overrides:
  record_linux: ^1.1.1

flutter:
  uses-material-design: true

  assets:
    - assets/google_img.png
    - assets/app_logo_dark.png
    - assets/app_logo_light.png
    - assets/black.png
    - .env
